<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Personal Dashboard</h1>
    <div class="add-buttons" style="display:none;">
        <button id="showAddGroup" >Add Group</button>
        <button id="showAddWebsite">Add Website</button>
    </div>
    <div class="add-button-container">
        <button id="toggleAddButtons">+</button>
    </div>
    <div class="modal" id="addGroupModal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addGroupModal')">&times;</span>
            <h2>Add Group</h2>
            <input type="text" id="newGroupName" placeholder="New Group Name">
            <button onclick="addGroup()">Add Group</button>
            <button onclick="closeModal('addGroupModal')">Cancel</button>
        </div>
    </div>
    <div class="modal" id="addWebsiteModal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addWebsiteModal')">&times;</span>
            <h2>Add Website</h2>
            <input type="text" id="newWebsiteName" placeholder="Website Name">
            <input type="text" id="newWebsiteUrl" placeholder="Website URL">
            <input type="text" id="newWebsiteDescription" placeholder="Website Description">
            <select id="groupSelect">
                <option value="">Select Group</option>
            </select>
            <button onclick="addWebsite()">Add Website</button>
            <button onclick="closeModal('addWebsiteModal')">Cancel</button>
        </div>
    </div>
    <div id="dashboard" class="group-container">
    </div>
    <div class="modal" id="editGroupModal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal('editGroupModal')">&times;</span>
            <h2>Edit Group</h2>
            <input type="text" id="modalEditGroupName" placeholder="New Group Name" style="user-select: text;">
            <button onclick="saveModalGroup()">Save</button>
            <button onclick="closeModal('editGroupModal')">Cancel</button>
        </div>
    </div>
    <div class="modal" id="editWebsiteModal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal('editWebsiteModal')">&times;</span>
            <h2>Edit Website</h2>
            <input type="text" id="modalEditWebsiteName" placeholder="New Website Name" style="user-select: text;">
            <input type="text" id="modalEditWebsiteUrl" placeholder="New Website URL" style="user-select: text;">
            <input type="text" id="modalEditWebsiteDescription" placeholder="New Website Description" style="user-select: text;">
            <select id="modalEditWebsiteGroup" style="user-select: text;">
                <option value="">Select Group</option>
            </select>
            <button onclick="saveModalWebsite()">Save</button>
            <button onclick="closeModal('editWebsiteModal')">Cancel</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
