<!DOCTYPE html>
<html lang="zh_CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="个人导航面板，用于组织和访问您常用的网站和资源">
    <title>个人导航面板</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <h1 aria-label="个人导航面板">个人导航面板</h1>
    <div class="add-buttons" style="display:none;">
<button id="showAddGroup" class="icon-button" aria-label="添加分组" data-tooltip="添加分组">
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
    <line x1="12" y1="11" x2="12" y2="17"/>
    <line x1="9" y1="14" x2="15" y2="14"/>
  </svg>
</button>
<button id="showAddWebsite" class="icon-button" aria-label="添加网站" data-tooltip="添加网站">
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9m9 9H3m9 9a9 9 0 0 1-9-9m9 9c1.66 0 3-4.03 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4.03-3-9s1.34-9 3-9m-9 9a9 9 0 0 1 9-9"/>
  </svg>
</button>
<button id="toggleTheme" class="icon-button" aria-label="切换主题" data-tooltip="切换主题">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5" />
        <path d="M12 1v2m0 18v2m-7.071-7.071l-1.414 1.414m14.142-1.414l-1.414 1.414m-7.071-7.071l1.414 1.414m-14.142-1.414l1.414 1.414" />
    </svg>
</button>
<button id="importData" class="icon-button" aria-label="导入数据" data-tooltip="导入配置">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19V5M5 12l7-7 7 7"/>
        <path d="M2 21h20v-2H2z"/>
    </svg>
</button>
<button id="exportData" class="icon-button" aria-label="导出数据" data-tooltip="导出配置">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M5 12l7 7 7-7"/>
        <path d="M2 3h20v2H2z"/>
    </svg>
</button>
<button id="importWebsites" class="icon-button" aria-label="粘贴导入网站" data-tooltip="批量添加">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 17l5-5-5-5M21 12H9"/>
        <path d="M3 3h18v2H3z"/>
    </svg>
</button>
</button>
    </div>
    <div class="add-button-container">
        <button id="toggleAddButtons" aria-label="切换添加按钮" data-tooltip="切换添加按钮">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                <path fill="currentColor" d="M12 4a1 1 0 011 1v6h6a1 1 0 110 2h-6v6a1 1 0 11-2 0v-6H5a1 1 0 110-2h6V5a1 1 0 011-1z" opacity="0.3"/>
            </svg>
        </button>
    </div>
    <main id="dashboard">
        <!-- Groups will be rendered here -->
    </main>
    <div class="modal" id="addGroupModal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addGroupModal')">&times;</span>
            <h2>添加分组</h2>
            <input type="text" id="newGroupName" placeholder="新分组名称">
            <div class="modal-buttons-container">
                <button onclick="addGroup()" aria-label="添加新分组">添加分组</button>
                <button onclick="closeModal('addGroupModal')" aria-label="取消创建分组">取消</button>
            </div>
        </div>
    </div>
    <div class="modal" id="addWebsiteModal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addWebsiteModal')">&times;</span>
            <h2>添加网站</h2>
            <input type="text" id="newWebsiteName" placeholder="网站名称">
            <input type="text" id="newWebsiteUrl" placeholder="网站地址">
            <input type="text" id="newWebsiteDescription" placeholder="网站描述">
            <select id="groupSelect">
                <option value="">选择分组</option>
            </select>
            <div class="modal-buttons-container">
                <button onclick="addWebsite()" aria-label="添加新网站">添加网站</button>
                <button onclick="closeModal('addWebsiteModal')" aria-label="取消创建网站">取消</button>
            </div>
        </div>
    </div>
    <div class="modal" id="editGroupModal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal('editGroupModal')">&times;</span>
            <h2>编辑分组</h2>
            <input type="text" id="modalEditGroupName" placeholder="新分组名称" style="user-select: text;">
            <div class="modal-buttons-container">
                <button onclick="saveModalGroup()">保存</button>
                <button onclick="closeModal('editGroupModal')">取消</button>
            </div>
        </div>
    </div>
    <div class="modal" id="editWebsiteModal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal('editWebsiteModal')">&times;</span>
            <h2>编辑网站</h2>
            <input type="text" id="modalEditWebsiteName" placeholder="新网站名称" style="user-select: text;">
            <input type="text" id="modalEditWebsiteUrl" placeholder="新网站地址" style="user-select: text;">
            <input type="text" id="modalEditWebsiteDescription" placeholder="新网站描述" style="user-select: text;">
            <select id="modalEditWebsiteGroup" style="user-select: text;">
                <option value="">选择分组</option>
            </select>
            <div class="modal-buttons-container">
                <button onclick="saveModalWebsite()">保存</button>
                <button onclick="closeModal('editWebsiteModal')">取消</button>
            </div>
        </div>
    </div>
    <div class="modal" id="pasteWebsitesModal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal('pasteWebsitesModal')">&times;</span>
            <h2>粘贴导入网站</h2>
            <textarea placeholder="请粘贴网站列表，格式为 网站名+网站地址+描述，一行一个" style="width: 96%; height: 200px;"></textarea>
            <select id="pasteWebsitesGroupSelect" style="margin-top: 10px;">
                <option value="">选择分组</option>
            </select>
            <div class="modal-buttons-container" style="margin-top: 10px;">
                <button id="savePasteWebsites">保存</button>
                <button id="cancelPasteWebsites" style="margin-left: 10px;">取消</button>
            </div>
        </div>
    </div>
    <div id="tooltip" style="display: none; position: absolute; z-index: 1000;"></div>
    <script src="script.js"></script>
</body>
</html>
